<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSTOYII</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700&family=Playfair+Display:wght@400;700&display=swap');

  :root {
    --bg-primary: #09090d;
    --bg-secondary: #13131f;
    --accent: #c9a84c;
    --accent-dim: rgba(201, 168, 76, 0.15);
    --text-primary: #e8e6e3;
    --text-muted: #8b8b8b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    overflow: hidden;
    position: relative;
  }

  /* 背景光晕 */
  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 140%;
    height: 180%;
    background: radial-gradient(ellipse at 50% 30%, rgba(201, 168, 76, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 60%, rgba(201, 168, 76, 0.04) 0%, transparent 50%);
    pointer-events: none;
    animation: breathe 8s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.8; }
    50% { opacity: 1; }
  }

  /* 网格纹理 */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(201, 168, 76, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201, 168, 76, 0.03) 1px, transparent 1px);
    background-size: 80px 80px;
    pointer-events: none;
  }

  main {
    text-align: center;
    z-index: 1;
    padding: 2rem;
  }

  .brand {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3.5rem, 8vw, 7rem);
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text-primary);
    margin-bottom: 0.5rem;
  }

  .brand-line {
    display: block;
    width: 80px;
    height: 2px;
    background: var(--accent);
    margin: 1.5rem auto;
    transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  main:hover .brand-line {
    width: 180px;
  }

  .tagline {
    font-size: 1.1rem;
    font-weight: 300;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    margin-bottom: 3rem;
  }

  .hint {
    font-size: 0.85rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  main:hover .hint {
    opacity: 0.7;
  }

  /* 四角装饰 */
  .corner {
    position: fixed;
    width: 120px;
    height: 120px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.25;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }
  .corner-tr { top: 24px; right: 24px; border-width: 1px 1px 0 0; }
  .corner-tl { top: 24px; left: 24px; border-width: 1px 0 0 1px; }
  .corner-br { bottom: 24px; right: 24px; border-width: 0 1px 1px 0; }
  .corner-bl { bottom: 24px; left: 24px; border-width: 0 0 1px 1px; }

  main:hover ~ .corner { opacity: 0.6; }
</style>
</head>
<body>

<main>
  <h1 class="brand">MSTOYII</h1>
  <div class="brand-line"></div>
  <p class="tagline">智 能 家 庭 管 理</p>
  <p class="hint">&#8212; 点 击 进 入 &#8212;</p>
</main>

<div class="corner corner-tr"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-br"></div>
<div class="corner corner-bl"></div>

<script>
  document.addEventListener('click', () => {
    document.body.style.opacity = '0';
    document.body.style.transition = 'opacity 0.4s ease';
    setTimeout(() => { window.location.href = '/admin'; }, 400);
  });
</script>
</body>
</html>
